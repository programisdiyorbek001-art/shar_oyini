<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharchalarni Ushla!</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh;
    background: linear-gradient(180deg, #7ec8f7 0%, #b8e6ff 60%, #d9f4ff 100%);
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    overflow:hidden;
    position:relative;
  }
  .cloud{
    position:absolute;
    background:#fff;
    border-radius:50px;
    opacity:0.85;
  }
  .cloud::before, .cloud::after{
    content:"";
    position:absolute;
    background:#fff;
    border-radius:50%;
  }
  .top-bar{
    position:relative;
    z-index:10;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
  }
  .question-box{
    background:#fff;
    border-radius:20px;
    padding:14px 24px;
    font-size:26px;
    font-weight:bold;
    color:#ff6b35;
    box-shadow:0 6px 0 #e0a06a, 0 10px 20px rgba(0,0,0,0.15);
    text-align:center;
  }
  .score-box{
    background:#fff;
    border-radius:20px;
    padding:14px 22px;
    font-size:20px;
    font-weight:bold;
    color:#2e86ab;
    box-shadow:0 6px 0 #b8d4e0, 0 10px 20px rgba(0,0,0,0.15);
  }
  .game-area{
    position:relative;
    width:100%;
    height:calc(100vh - 90px);
    overflow:hidden;
  }
  .balloon{
    position:absolute;
    width:80px;
    height:96px;
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:26px;
    font-weight:bold;
    cursor:pointer;
    box-shadow: inset -8px -8px 15px rgba(0,0,0,0.15), 0 8px 16px rgba(0,0,0,0.2);
    animation: float 6s linear forwards;
    user-select:none;
    transition: transform 0.1s ease;
  }
  .balloon:hover{ transform: scale(1.08); }
  .balloon::after{
    content:"";
    position:absolute;
    bottom:-14px;
    width:2px;
    height:16px;
    background:#999;
  }
  @keyframes float{
    from{ transform: translateY(110vh) rotate(-4deg); }
    to{ transform: translateY(-140px) rotate(4deg); }
  }
  .pop{
    position:absolute;
    font-size:34px;
    pointer-events:none;
    animation: popAnim 0.6s ease forwards;
  }
  @keyframes popAnim{
    0%{ transform: scale(0.5); opacity:1; }
    60%{ transform: scale(1.4); opacity:1; }
    100%{ transform: scale(1.8); opacity:0; }
  }
  .message{
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:44px;
    font-weight:bold;
    color:#ff6b35;
    text-shadow: 0 4px 0 #fff;
    z-index:20;
    animation: messagePop 1s ease forwards;
    pointer-events:none;
  }
  @keyframes messagePop{
    0%{ transform:translate(-50%,-50%) scale(0.3); opacity:0; }
    30%{ transform:translate(-50%,-50%) scale(1.2); opacity:1; }
    70%{ transform:translate(-50%,-50%) scale(1); opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(1); opacity:0; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="question-box" id="question">Boshlanmoqda...</div>
  <div class="score-box">⭐ Ball: <span id="score">0</span></div>
</div>

<div class="game-area" id="gameArea"></div>

<script>
  const gameArea = document.getElementById('gameArea');
  const questionEl = document.getElementById('question');
  const scoreEl = document.getElementById('score');

  const colors = ['#ff6b6b','#4ecdc4','#ffd93d','#a06cd5','#ff9f45','#6bcB77'];
  let score = 0;
  let correctAnswer = null;
  let spawnTimer = null;

  function makeClouds(){
    for(let i=0;i<4;i++){
      const c = document.createElement('div');
      c.className = 'cloud';
      const w = 80 + Math.random()*60;
      c.style.width = w+'px';
      c.style.height = (w*0.5)+'px';
      c.style.top = (10 + Math.random()*30)+'%';
      c.style.left = (Math.random()*90)+'%';
      document.body.appendChild(c);
    }
  }

  function newQuestion(){
    const a = Math.floor(Math.random()*10)+1;
    const b = Math.floor(Math.random()*10)+1;
    const ops = ['+','-'];
    const op = ops[Math.floor(Math.random()*ops.length)];
    let answer;
    if(op === '+'){ answer = a+b; }
    else{
      const hi = Math.max(a,b), lo = Math.min(a,b);
      answer = hi-lo;
      questionEl.textContent = `${hi} − ${lo} = ?`;
      correctAnswer = answer;
      return;
    }
    questionEl.textContent = `${a} + ${b} = ?`;
    correctAnswer = answer;
  }

  function randomOptions(){
    const opts = new Set([correctAnswer]);
    while(opts.size < 4){
      const delta = Math.floor(Math.random()*7)-3;
      const val = correctAnswer + delta;
      if(val >= 0) opts.add(val);
    }
    return Array.from(opts).sort(()=>Math.random()-0.5);
  }

  function spawnBalloon(number){
    const balloon = document.createElement('div');
    balloon.className = 'balloon';
    balloon.textContent = number;
    balloon.style.background = colors[Math.floor(Math.random()*colors.length)];
    balloon.style.left = (Math.random()*85)+'%';
    balloon.style.animationDuration = (5 + Math.random()*3)+'s';

    balloon.addEventListener('click', ()=>{
      popEffect(balloon, number === correctAnswer);
      balloon.remove();
    });
    balloon.addEventListener('animationend', ()=> balloon.remove());
    gameArea.appendChild(balloon);
  }
  function popEffect(balloon, isCorrect){
    const rect = balloon.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.className = 'pop';
    pop.textContent = isCorrect ? '🎉' : '💥';
    pop.style.left = rect.left+'px';
    pop.style.top = rect.top+'px';
    document.body.appendChild(pop);
    setTimeout(()=> pop.remove(), 600);
    if(isCorrect){
      score += 10;
      scoreEl.textContent = score;
      showMessage('Ajoyib! 🌟');
      roundReset();
    } else {
      score = Math.max(0, score-2);
      scoreEl.textContent = score;
    }
  }

  function showMessage(text){
    const msg = document.createElement('div');
    msg.className = 'message';
    msg.textContent = text;
    gameArea.appendChild(msg);
    setTimeout(()=> msg.remove(), 1000);
  }
  function roundReset(){   document.querySelectorAll('.balloon').forEach(b=>b.remove());
    clearInterval(spawnTimer);
    newQuestion();
    startSpawning();
  }

  function startSpawning(){
    const options = randomOptions();
    let i = 0;
    spawnTimer = setInterval(()=>{
      if(i < options.length){
        spawnBalloon(options[i]);
        i++;
      } else {
        i = 0;
      }
    }, 900);
  }
  makeClouds();
  newQuestion();
  startSpawning();
</script>
</body>
</html>
